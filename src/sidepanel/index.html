<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>PreMeet</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #1a1a2e;
        background: #fff;
        min-height: 100vh;
      }

      /* ── Header ── */
      .pm-header {
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        color: #fff;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .pm-header__logo {
        width: 32px; height: 32px; flex-shrink: 0;
      }
      .pm-header__info { flex: 1; min-width: 0; }
      .pm-header__title { font-size: 16px; font-weight: 600; }
      .pm-header__meeting {
        font-size: 13px; opacity: 0.85; margin-top: 3px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .pm-credits {
        font-size: 11px;
        background: rgba(255,255,255,0.18);
        border-radius: 10px;
        padding: 3px 8px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .pm-credits--low { background: rgba(254,202,202,0.35); }

      /* ── Loading bar ── */
      .pm-loading-bar {
        height: 3px; background: #dbeafe;
        position: relative; overflow: hidden;
      }
      .pm-loading-bar::after {
        content: ''; position: absolute; left: -60%; top: 0;
        width: 60%; height: 100%; background: #2563eb;
        animation: pm-slide 1.2s ease-in-out infinite;
      }
      @keyframes pm-slide { to { left: 100%; } }

      /* ── States ── */
      .pm-state {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 60px 24px; text-align: center; gap: 12px;
      }
      .pm-state__icon { font-size: 36px; }
      .pm-state__title { font-size: 16px; font-weight: 600; color: #374151; }
      .pm-state__body { font-size: 13px; color: #6b7280; line-height: 1.6; max-width: 280px; }
      .pm-hidden { display: none !important; }

      /* ── Attendee list ── */
      .pm-list { padding: 8px 0; }

      .pm-card {
        padding: 16px 20px;
        border-bottom: 1px solid #f3f4f6;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        transition: background 0.15s;
      }
      .pm-card:hover { background: #f9fafb; }
      .pm-card:last-child { border-bottom: none; }

      .pm-avatar {
        width: 48px; height: 48px; border-radius: 50%;
        background: #dbeafe; color: #1d4ed8;
        display: flex; align-items: center; justify-content: center;
        font-size: 15px; font-weight: 600; flex-shrink: 0;
        text-transform: uppercase;
      }

      .pm-card__body { flex: 1; min-width: 0; }
      .pm-card__name {
        font-weight: 600; font-size: 15px; color: #111827;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .pm-card__title { font-size: 12px; color: #6b7280; margin-top: 3px; }
      .pm-card__company { font-size: 13px; color: #374151; margin-top: 5px; font-weight: 500; }
      .pm-card__email { font-size: 11px; color: #9ca3af; margin-top: 3px; }

      /* ── Progress stepper ── */
      .pm-stepper {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: #f9fafb;
        border-bottom: 1px solid #f3f4f6;
      }
      .pm-step {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex: 1;
        position: relative;
      }
      .pm-step__dot {
        width: 24px; height: 24px; border-radius: 50%;
        background: #e5e7eb;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; color: #9ca3af;
        transition: all 0.3s ease;
      }
      .pm-step__label {
        font-size: 10px; color: #9ca3af;
        white-space: nowrap;
        transition: color 0.3s ease;
      }
      .pm-step--active .pm-step__dot {
        background: #2563eb; color: #fff;
        animation: pm-dot-pulse 1.4s ease-in-out infinite;
      }
      .pm-step--active .pm-step__label { color: #2563eb; font-weight: 600; }
      .pm-step--done .pm-step__dot {
        background: #16a34a; color: #fff;
      }
      .pm-step--done .pm-step__label { color: #16a34a; }
      .pm-step__connector {
        position: absolute;
        top: 12px; left: calc(50% + 16px); right: calc(-50% + 16px);
        height: 2px; background: #e5e7eb;
        transition: background 0.3s ease;
      }
      .pm-step--done .pm-step__connector { background: #16a34a; }
      @keyframes pm-dot-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); } 50% { box-shadow: 0 0 0 6px rgba(37,99,235,0); } }

      /* ── Attendee counter ── */
      .pm-counter {
        padding: 8px 20px;
        font-size: 12px;
        color: #6b7280;
        background: #fafbfc;
        border-bottom: 1px solid #f3f4f6;
      }

      /* ── Skeleton loading ── */
      .pm-card--pending .pm-avatar {
        width: 48px; height: 48px;
        background: #f3f4f6;
        color: transparent;
        animation: pm-shimmer 1.4s ease-in-out infinite;
      }
      .pm-card--pending .pm-card__name {
        background: #f3f4f6; border-radius: 4px; color: transparent;
        width: 120px; height: 16px;
        animation: pm-shimmer 1.4s ease-in-out infinite;
      }
      .pm-card--pending .pm-card__title {
        background: #f3f4f6; border-radius: 3px; color: transparent;
        width: 160px; height: 12px;
        animation: pm-shimmer 1.4s ease-in-out infinite 0.1s;
      }
      .pm-card--pending .pm-card__company {
        background: #f3f4f6; border-radius: 3px; color: transparent;
        width: 100px; height: 12px;
        animation: pm-shimmer 1.4s ease-in-out infinite 0.2s;
      }
      @keyframes pm-shimmer {
        0% { background-position: -200px 0; }
        100% { background-position: 200px 0; }
      }
      .pm-card--pending .pm-avatar,
      .pm-card--pending .pm-card__name,
      .pm-card--pending .pm-card__title,
      .pm-card--pending .pm-card__company {
        background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
        background-size: 400px 100%;
      }
      @keyframes pm-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

      /* ── Progressive data fill ── */
      .pm-card__name.pm-fadein,
      .pm-card__title.pm-fadein,
      .pm-card__company.pm-fadein {
        animation: pm-data-fadein 200ms ease-out;
      }
      @keyframes pm-data-fadein { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

      /* ── Cache hit flash ── */
      .pm-card--cache-hit {
        animation: pm-cache-flash 600ms ease-out;
      }
      @keyframes pm-cache-flash { 0% { background: rgba(22,163,74,0.15); } 100% { background: transparent; } }

      /* ── Usable state: green left-border when LinkedIn data arrives ── */
      .pm-card--usable {
        border-left: 3px solid #16a34a;
      }

      /* ── Complete state: full green border ── */
      .pm-card--complete {
        border: 1px solid #16a34a;
        border-radius: 4px;
        margin: 4px 8px;
      }

      /* ── Footer ── */
      .pm-footer {
        padding: 12px 20px;
        border-top: 1px solid #f3f4f6;
        font-size: 11px;
        color: #9ca3af;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="pm-header">
      <svg class="pm-header__logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="10" r="3.5" fill="#fff"/>
        <path d="M8 20.5c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
        <circle cx="22" cy="7" r="1.5" fill="#fff" opacity="0.7"/>
        <circle cx="6" cy="7" r="1" fill="#fff" opacity="0.5"/>
      </svg>
      <div class="pm-header__info">
        <div class="pm-header__title">PreMeet</div>
        <div class="pm-header__meeting" id="pm-meeting-title"></div>
        <div class="pm-header__meeting" id="pm-attendee-count" style="font-size:11px;opacity:0.7;"></div>
      </div>
      <div class="pm-credits pm-hidden" id="pm-credits"></div>
    </header>

    <div class="pm-loading-bar pm-hidden" id="pm-loading-bar"></div>

    <!-- Progress stepper -->
    <div class="pm-stepper pm-hidden" id="pm-stepper">
      <div class="pm-step" data-step="searching">
        <div class="pm-step__dot">1</div>
        <div class="pm-step__label">Searching</div>
        <div class="pm-step__connector"></div>
      </div>
      <div class="pm-step" data-step="resolving">
        <div class="pm-step__dot">2</div>
        <div class="pm-step__label">Resolving</div>
        <div class="pm-step__connector"></div>
      </div>
      <div class="pm-step" data-step="enriching">
        <div class="pm-step__dot">3</div>
        <div class="pm-step__label">Enriching</div>
        <div class="pm-step__connector"></div>
      </div>
      <div class="pm-step" data-step="complete">
        <div class="pm-step__dot">4</div>
        <div class="pm-step__label">Complete</div>
      </div>
    </div>

    <!-- Attendee counter -->
    <div class="pm-counter pm-hidden" id="pm-counter"></div>

    <!-- Empty state -->
    <div class="pm-state" id="pm-empty">
      <div class="pm-state__icon">&#128197;</div>
      <div class="pm-state__title">No meeting selected</div>
      <div class="pm-state__body">Click on a Google Calendar event to see who you're meeting.</div>
    </div>

    <!-- Error state -->
    <div class="pm-state pm-hidden" id="pm-error">
      <div class="pm-state__icon">&#9888;&#65039;</div>
      <div class="pm-state__title">Something went wrong</div>
      <div class="pm-state__body" id="pm-error-msg">Could not load meeting data.</div>
    </div>

    <!-- Attendee list -->
    <div class="pm-list pm-hidden" id="pm-list"></div>

    <footer class="pm-footer pm-hidden" id="pm-footer">PreMeet &copy; <span id="pm-year"></span></footer>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
