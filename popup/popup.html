<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self';"
    />
    <title>Meeting Intel</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <!-- Gradient header -->
    <header class="mp-header">
      <div class="mp-header__icon" aria-hidden="true">MI</div>
      <div class="mp-header__text">
        <h1 class="mp-header__title">Meeting Intel</h1>
        <p class="mp-header__version" id="mp-version">v&ndash;</p>
      </div>
    </header>

    <main class="mp-main">

      <!-- Status pill -->
      <section class="mp-section" aria-label="Extension status">
        <div class="mp-status" id="mp-status" role="status" aria-live="polite">
          <span class="mp-status__dot mp-status__dot--active" aria-hidden="true"></span>
          <span id="mp-status-label">Active on Google Calendar</span>
        </div>
      </section>

      <!-- Cache management -->
      <section class="mp-section" aria-label="Cache management">
        <h2 class="mp-section__heading">Cache</h2>
        <div class="mp-cache-grid" id="mp-cache-stats" aria-label="Cache statistics">
          <div class="mp-cache-stat">
            <span class="mp-cache-stat__value" id="mp-cache-count">&ndash;</span>
            <span class="mp-cache-stat__label">Profiles</span>
          </div>
          <div class="mp-cache-stat">
            <span class="mp-cache-stat__value" id="mp-cache-size">&ndash;</span>
            <span class="mp-cache-stat__label">Storage</span>
          </div>
          <div class="mp-cache-stat" id="mp-cache-expired-row">
            <span
              class="mp-cache-stat__value mp-cache-stat__value--warn"
              id="mp-cache-expired"
            >&ndash;</span>
            <span class="mp-cache-stat__label">Expired</span>
          </div>
        </div>
        <button type="button" id="mp-cache-clear" class="mp-btn mp-btn--secondary">
          Clear Cache
        </button>
        <p
          class="mp-feedback"
          id="mp-cache-feedback"
          role="alert"
          aria-live="polite"
          aria-atomic="true"
        ></p>
      </section>

      <!-- About -->
      <section class="mp-section mp-about" aria-label="About Meeting Intel">
        <h2 class="mp-section__heading">About</h2>
        <p class="mp-about__desc">
          Professional background for Google Calendar attendees&mdash;right
          inside the event without switching tabs.
        </p>
        <a
          href="https://github.com/iDroproject/gcal-meeting-intel"
          target="_blank"
          rel="noopener noreferrer"
          class="mp-link"
          aria-label="View Meeting Intel source code on GitHub (opens in new tab)"
        >
          View on GitHub
        </a>
      </section>

    </main>

    <footer class="mp-footer">
      <p class="mp-footer__text">
        Meeting Intel &copy; <span id="mp-year"></span>
      </p>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
