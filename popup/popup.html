<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self';"
    />
    <title>PreMeet</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../icons/icon32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../icons/icon16.png" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <!-- Gradient header -->
    <header class="bp-header">
      <div class="bp-header__icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="10" r="3.5" fill="#fff"/>
          <path d="M8 20.5c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
          <circle cx="22" cy="7" r="1.5" fill="#fff" opacity="0.7"/>
          <circle cx="6" cy="7" r="1" fill="#fff" opacity="0.5"/>
          <circle cx="23" cy="14" r="1" fill="#fff" opacity="0.5"/>
        </svg>
      </div>
      <div class="bp-header__text">
        <h1 class="bp-header__title">PreMeet</h1>
        <p class="bp-header__version" id="bp-version">v&ndash;</p>
      </div>
    </header>

    <!-- Tab bar -->
    <nav class="bp-tabs" role="tablist" aria-label="Popup sections">
      <button class="bp-tab bp-tab--active" role="tab" aria-selected="true"
              aria-controls="bp-tab-settings" id="bp-tab-btn-settings">Settings</button>
      <button class="bp-tab" role="tab" aria-selected="false"
              aria-controls="bp-tab-history" id="bp-tab-btn-history">History</button>
      <button class="bp-tab" role="tab" aria-selected="false"
              aria-controls="bp-tab-logs" id="bp-tab-btn-logs">Logs</button>
    </nav>

    <main class="bp-main">

      <!-- ═══ Settings tab ═══ -->
      <div class="bp-tab-panel" id="bp-tab-settings" role="tabpanel" aria-labelledby="bp-tab-btn-settings">

        <!-- Status pill -->
        <section class="bp-section" aria-label="Extension status">
          <div class="bp-status" id="bp-status" role="status" aria-live="polite">
            <span class="bp-status__dot bp-status__dot--active" aria-hidden="true"></span>
            <span id="bp-status-label">Active on Google Calendar</span>
          </div>
        </section>

        <!-- API Token -->
        <section class="bp-section" aria-label="API settings">
          <h2 class="bp-section__heading">API Token</h2>
          <div class="bp-token-row">
            <input type="password" id="bp-token-input" class="bp-token-input"
                   placeholder="Paste API token..." aria-label="API token" />
            <button type="button" id="bp-token-toggle" class="bp-btn-icon" aria-label="Show/hide token">
              &#x1F441;
            </button>
          </div>
          <div class="bp-token-actions">
            <button type="button" id="bp-token-save" class="bp-btn bp-btn--primary bp-btn--sm">Save Token</button>
            <a href="https://premeet.co/settings" target="_blank"
               rel="noopener noreferrer" class="bp-link">Get API Token &rarr;</a>
          </div>
          <p class="bp-feedback" id="bp-token-feedback" role="alert" aria-live="polite" aria-atomic="true"></p>
          <p class="bp-token-hint">Demo token: <code>3072****b1d9</code></p>
        </section>

        <!-- Cache management -->
        <section class="bp-section" aria-label="Cache management">
          <h2 class="bp-section__heading">Cache</h2>
          <div class="bp-cache-grid" id="bp-cache-stats" aria-label="Cache statistics">
            <div class="bp-cache-stat">
              <span class="bp-cache-stat__value" id="bp-cache-count">&ndash;</span>
              <span class="bp-cache-stat__label">Profiles</span>
            </div>
            <div class="bp-cache-stat">
              <span class="bp-cache-stat__value" id="bp-cache-size">&ndash;</span>
              <span class="bp-cache-stat__label">Storage</span>
            </div>
            <div class="bp-cache-stat" id="bp-cache-expired-row">
              <span class="bp-cache-stat__value bp-cache-stat__value--warn" id="bp-cache-expired">&ndash;</span>
              <span class="bp-cache-stat__label">Expired</span>
            </div>
          </div>
          <button type="button" id="bp-cache-clear" class="bp-btn bp-btn--secondary">Clear Cache</button>
          <p class="bp-feedback" id="bp-cache-feedback" role="alert" aria-live="polite" aria-atomic="true"></p>
        </section>

        <!-- Links -->
        <section class="bp-section" aria-label="Useful links">
          <h2 class="bp-section__heading">Links</h2>
          <div class="bp-links">
            <a href="https://premeet.co/settings" target="_blank" rel="noopener noreferrer" class="bp-link">Settings</a>
            <a href="https://premeet.co/docs" target="_blank" rel="noopener noreferrer" class="bp-link">Documentation</a>
          </div>
        </section>

      </div>

      <!-- ═══ History tab ═══ -->
      <div class="bp-tab-panel bp-hidden" id="bp-tab-history" role="tabpanel" aria-labelledby="bp-tab-btn-history">
        <div class="bp-history-list" id="bp-history-list" aria-label="Lookup history">
          <p class="bp-history-empty" id="bp-history-empty">No lookups yet.</p>
        </div>
      </div>

      <!-- ═══ Logs tab ═══ -->
      <div class="bp-tab-panel bp-hidden" id="bp-tab-logs" role="tabpanel" aria-labelledby="bp-tab-btn-logs">
        <div class="bp-logs-controls">
          <select id="bp-logs-module" class="bp-select" aria-label="Filter by module">
            <option value="">All modules</option>
          </select>
          <select id="bp-logs-level" class="bp-select" aria-label="Filter by level">
            <option value="">All levels</option>
            <option value="info">Info</option>
            <option value="warn">Warn</option>
            <option value="error">Error</option>
          </select>
          <button type="button" id="bp-logs-refresh" class="bp-btn-icon" aria-label="Refresh logs">&#x21BB;</button>
        </div>
        <div class="bp-logs-list" id="bp-logs-list" aria-label="Log entries">
          <p class="bp-logs-empty" id="bp-logs-empty">No log entries.</p>
        </div>
      </div>

    </main>

    <footer class="bp-footer">
      <p class="bp-footer__text">
        PreMeet &copy; <span id="bp-year"></span>
      </p>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
