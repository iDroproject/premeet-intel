<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self';"
    />
    <title>Meeting Intel</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <header class="mp-header">
      <div class="mp-header__logo" aria-hidden="true">&#x1F50D;</div>
      <div class="mp-header__text">
        <h1 class="mp-header__title">Meeting Intel</h1>
        <p class="mp-header__tagline">Know who's in the room</p>
      </div>
    </header>

    <main class="mp-main">

      <!-- Status pill -->
      <section class="mp-status-section" aria-label="Extension status">
        <div class="mp-status" id="mp-status" role="status" aria-live="polite">
          <span class="mp-status__dot mp-status__dot--active" aria-hidden="true"></span>
          <span class="mp-status__label">Active on Google Calendar</span>
        </div>
      </section>

      <hr class="mp-divider" />

      <!-- Info rows -->
      <section class="mp-info-section" aria-label="Extension information">
        <dl class="mp-info-list">
          <div class="mp-info-row">
            <dt class="mp-info-row__label">Version</dt>
            <dd class="mp-info-row__value" id="mp-version">–</dd>
          </div>
          <div class="mp-info-row">
            <dt class="mp-info-row__label">Phase</dt>
            <dd class="mp-info-row__value">1 &mdash; Local Detection</dd>
          </div>
        </dl>
      </section>

      <hr class="mp-divider" />

      <!-- How it works -->
      <section class="mp-how-section" aria-label="How to use">
        <h2 class="mp-how-section__heading">How to use</h2>
        <ol class="mp-how-list">
          <li>Open any event on Google Calendar.</li>
          <li>Click <strong>"Know [Name]"</strong> next to an attendee.</li>
          <li>View their background in the side panel.</li>
        </ol>
      </section>

    </main>

    <footer class="mp-footer">
      <p class="mp-footer__text">Meeting Intel &copy; <span id="mp-year"></span></p>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
